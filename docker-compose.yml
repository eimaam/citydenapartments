services:
  mongodb:
    image: mongo:7
    container_name: cityden-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cityden

  mongo-setup:
    image: mongo:7
    container_name: cityden-mongo-setup
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        sleep 2 &&
        mongosh --host mongodb:27017 --eval '
          rs.initiate({
            _id: "rs0",
            version: 1,
            members: [{ _id: 0, host: "mongodb:27017" }]
          });
        ' &&
        echo "Replica set initialized."
    networks:
      - cityden

  redis:
    image: redis:7-alpine
    container_name: cityden-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cityden

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: cityden-server
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env.production
    restart: unless-stopped
    networks:
      - cityden

volumes:
  mongodb_data:
  redis_data:

networks:
  cityden:
    driver: bridge
